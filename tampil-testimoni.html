<html lang="id">
<head>

<body>

        <h1>Toko Buku Jasmine</h1>
        <header>
    <img src="background web3.png" width="1312" height="300">
    </header>
    <main class="formulir">
        <h2>testimoni-testimoni  pembeli :</h2>
        <div id="daftartestimoni"></div>

        <button id="hapusSemua">hapus semua testimoni</button>
    </div>

    <section> <div id="daftartestimoni"></div></section>
    </main>

    <footer>
        <p>&copy; 2025 toko buku jasmine</p>
    </footer>
    <script>
  const container = document.getElementById('daftar testimoni');
  const testimonilist = JSON.parse(localStorage.getItem('testimoni list')) || [];

  if (testimonilist.length === 0) {
    container.innerHTML = "<p>Belum ada testimoni.</p>";
  } else {
    testimonilist.forEach((t) => {
      const el = document.createElement('div');
      el.className = 'testimoni-box';
      el.innerHTML = `
        <p><strong>Nama:</strong> ${t.nama}</p>
        <p><strong>Asal sekolah/instansi/komunitas:</strong> ${t.asal}</p>
        <p><strong>Email:</strong> ${t.email}</p>
        <p><strong>Judul buku yang dibeli:</strong> ${t.judul}</p>
        <p><strong>Testimoni anda:</strong> ${t.pesan}</p>
      `;
      container.appendChild(el);
    });
  }
</script>
</body>
</html>
