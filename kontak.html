<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Premium UI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com" crossorigin="anonymous"></script>
</head>
<body>
    <div class="background-animate"></div>
    
    <div class="contact-container">
        <div class="contact-info">
            <h1>Let's Connect</h1>
            <p>Punya ide gila atau sekadar mau menyapa? Gas, kirim pesan sekarang!</p>
            
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span>halo@emailkamu.com</span>
            </div>
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>sidioarjo, Indonesia</span>
            </div>

            <div class="social-icons">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>

        <form class="contact-form">
            <div class="input-group">
                <input type="text" required>
                <label>Full Name</label>
            </div>
            <div class="input-group">
                <input type="email" required>
                <label>Email Address</label>
            </div>
            <div class="input-group">
                <textarea required></textarea>
                <label>Your Message</label>
            </div>
            <button type="submit" class="submit-btn">
                <span>SEND MESSAGE</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>
</body>
</html>
